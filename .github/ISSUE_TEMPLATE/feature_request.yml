name: "✨ 기능 요청"
description: "새로운 기능이나 개선 아이디어를 제안합니다."
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: description
    attributes:
      label: 기능 설명
      description: 어떤 기능이 필요한지 간단히 설명해주세요.
      placeholder: |
        예: 홈 화면에서 최근 산책 기록을 한눈에 볼 수 있는 카드가 있으면 좋겠습니다.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 배경/동기
      description: 왜 이 기능이 필요한지, 어떤 문제를 해결하는지 적어주세요.
      placeholder: |
        예: 현재는 최근 기록을 확인하려면 여러 화면을 이동해야 해서 접근성이 떨어집니다.
    validations:
      required: false

  - type: dropdown
    id: layer
    attributes:
      label: 관련 레이어
      description: 이번 요청과 가장 가까운 레이어를 선택해주세요.
      options:
        - App
        - Feature
        - Domain
        - Core
        - Shared
        - 잘 모르겠음
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 작업 목록
      description: 예상 작업이 있다면 체크리스트 형태로 작성해주세요.
      placeholder: |
        - [ ] 요구사항 정리
        - [ ] UI 구현
        - [ ] TCA 상태/액션/리듀서 반영
        - [ ] 테스트 작성
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: 참고 자료
      description: 디자인 시안, 문서, 관련 링크 등이 있다면 남겨주세요.
      placeholder: |
        예: Figma 링크, 참고 앱 스크린샷, 관련 문서
    validations:
      required: false
